<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LearnArmenian - Тренировка алфавита</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="game-nav">
            <a href="game.html">🎮 Игра</a>
            <a href="alphabet.html">🔤 Алфавит</a>
            <a href="alphabet-practice.html" class="active">📝 Тренировка</a>
            <a href="profile.html">👤 Профиль</a>
            <button id="logout-btn" class="logout-small">🚪 Выйти</button>
        </nav>

        <div class="alphabet-practice-container">
            <h2>📝 Тренировка алфавита</h2>
            <div class="mode-switcher">
                <button id="mode-letter-to-name" class="mode-btn active">Буква AM → Буква RU</button>
                <button id="mode-name-to-letter" class="mode-btn">Буква RU → Буква AM</button>
            </div>
            <div class="practice-area">
                <div class="practice-card">
                    <div id="practice-question" class="practice-question">Загрузка...</div>
                    <div id="practice-options" class="practice-options"></div>
                </div>
                <div id="practice-message" class="practice-message"></div>
                <button id="practice-next" class="next-btn" style="display: none;">➡ Следующая буква</button>
            </div>
            <div class="practice-stats">
                <span>✅ Правильных: <span id="practice-correct">0</span></span>
                <span>❌ Неправильных: <span id="practice-wrong">0</span></span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
